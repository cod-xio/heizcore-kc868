name: Firmware bauen

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF Build (esp32)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32
          path: '.'
          # Managed Components zuerst laden, dann bauen.
          # idf.py reconfigure löst Abhängigkeiten auf und legt
          # managed_components/joltwallet__littlefs an – erst danach
          # greift EXTRA_COMPONENT_DIRS im CMakeLists korrekt.
          command: >
            idf.py reconfigure &&
            idf.py build

      - name: Artefakte sammeln
        run: |
          mkdir -p artifacts
          cp build/heizcore.bin            artifacts/ 2>/dev/null || true
          cp build/bootloader/bootloader.bin artifacts/ 2>/dev/null || true
          cp build/partition_table/partition-table.bin artifacts/ 2>/dev/null || true
          cp build/storage.bin             artifacts/ 2>/dev/null || true
          cp build/ota_data_initial.bin    artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Firmware-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: heizcore-firmware
          path: artifacts/
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: heizcore-firmware
          path: artifacts
      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
